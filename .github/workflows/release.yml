name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    uses: ./.github/workflows/build.yml

  release:
    runs-on: ubuntu-latest
    needs:
      - build
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Rename for release
        run: |
          mkdir release/
          cp artifacts/libmonero-cpp-ubuntu-24.04/libmonero-cpp.so          release/libmonero-cpp.so
          cp artifacts/libmonero-c-ubuntu-24.04/libmonero-c.so              release/libmonero-c.so
          cp artifacts/libmonero-cpp-win-x64/libmonero-cpp.dll              release/libmonero-cpp.dll
          cp artifacts/libmonero-cpp-win-x64/libmonero-cpp.dll.a            release/libmonero-cpp.dll.a
          cp artifacts/libmonero-c-win-x64/libmonero-c.dll                  release/libmonero-c.dll
          cp artifacts/libmonero-c-win-x64/libmonero-c.dll.a                release/libmonero-c.dll.a
          cp artifacts/libmonero-cpp-macos-15/libmonero-cpp.dylib           release/libmonero-cpp.dylib
          cp artifacts/libmonero-c-macos-15/libmonero-c.dylib               release/libmonero-c.dylib
          cp artifacts/libmonero-cpp-macos-15-intel/libmonero-cpp.dylib     release/libmonero-cpp-intel.dylib
          cp artifacts/libmonero-c-macos-15-intel/libmonero-c.dylib         release/libmonero-c-intel.dylib

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: true
          prerelease: false
          generate_release_notes: true
          files: release/*
