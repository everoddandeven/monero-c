name: Build Windows x64

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows-x64:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Initialize
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup MSYS2 MINGW64
        uses: msys2/setup-msys2@e9898307ac31d1a803454791be09ab9973336e1c
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-zeromq
            mingw-w64-x86_64-libsodium
            mingw-w64-x86_64-hidapi
            mingw-w64-x86_64-unbound
            mingw-w64-x86_64-protobuf
            mingw-w64-x86_64-libusb
            mingw-w64-x86_64-libevent
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            mingw-w64-x86_64-ntldd
            git
            base-devel
            wget
            
      - name: Install boost v1.85.0
        run: |
          wget https://repo.msys2.org/mingw/mingw64/mingw-w64-x86_64-boost-1.85.0-4-any.pkg.tar.zst
          pacman -U --noconfirm mingw-w64-x86_64-boost-1.85.0-4-any.pkg.tar.zst

      - name: Build Monero project
        run: |
          cd submodules/monero-cpp/external/monero-project

          mkdir -p build/release
          cd build/release

          cmake -G "MSYS Makefiles" \
            -D STATIC=ON \
            -D ARCH="x86-64" \
            -D BUILD_64=ON \
            -D CMAKE_BUILD_TYPE=Release \
            -D BUILD_TAG="win-x64" \
            -D CMAKE_TOOLCHAIN_FILE="../../cmake/64-bit-toolchain.cmake" \
            -D MSYS2_FOLDER=$(cd $MINGW_PREFIX/.. && pwd -W) \
            ../../

          make wallet cryptonote_protocol -j$(nproc)

      - name: Build Monero C++
        run: |
          cmake -S submodules/monero-cpp -B submodules/monero-cpp/build
          cmake --build submodules/monero-cpp/build

      - name: Upload monero-cpp library
        uses: actions/upload-artifact@v7
        with:
          name: libmonero-cpp-win-x64.dll
          path: submodules/monero-cpp/build/libmonero-cpp.dll

      - name: Build monero-c
        run: |
          cmake -S MoneroC -B MoneroC/build
          cmake --build MoneroC/build

      - name: Upload monero-c
        uses: actions/upload-artifact@v7
        with:
          name: libmonero-c-win-x64.dll
          path: MoneroC/build/libmonero-c.dll

      - name: Build CsharpTestApp
        shell: pwsh
        run: dotnet build CsharpTestApp

      - name: Copy native C++ library
        run: cp submodules/monero-cpp/build/libmonero-cpp.dll CsharpTestApp/bin/Debug/net10.0/

      - name: Copy native C library
        run: cp MoneroC/build/libmonero-c.dll CsharpTestApp/bin/Debug/net10.0/monero-c.dll

      - name: Run CsharpTestApp
        run: |
          cd CsharpTestApp/bin/Debug/net10.0
          ./CsharpTestApp.exe
